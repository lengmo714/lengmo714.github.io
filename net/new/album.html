<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>相册</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 6px;
      padding: 6px;
    }

    .photo {
      position: relative;
      background: #1a1a1a;
      aspect-ratio: 1 / 1;
      overflow: hidden;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      visibility: hidden; /* 初始隐藏，避免闪烁 */
    }

    /* 图片加载完成后，显示图片 */
    .photo img.loaded {
      visibility: visible;
    }

    /* ===== 大图查看 ===== */
    .viewer {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .viewer img {
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>

<body>

  <div class="grid" id="grid"></div>

  <div class="viewer" id="viewer">
    <img id="viewerImg" />
  </div>

  <script>
    const params = new URLSearchParams(location.search)
    const albumId = params.get('id')

    const grid = document.getElementById('grid')
    const viewer = document.getElementById('viewer')
    const viewerImg = document.getElementById('viewerImg')

    /* ===== 懒加载观察器 ===== */
    const io = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;

        const img = entry.target;

        // 防止重复加载
        if (img.dataset.loaded === '1') {
          io.unobserve(img);
          return;
        }

        img.dataset.loaded = '1';
        img.src = img.dataset.thumb + '?t=' + new Date().getTime();;

        img.onload = () => {
            img.classList.add('loaded');
        };

        io.unobserve(img);
      });
    }, { rootMargin: '200px' });

    /* ===== 加载相册 JSON ===== */
    fetch(`data/${albumId}.json`)
      .then(res => res.json())
      .then(list => {
        list.forEach(item => {
          const box = document.createElement('div');
          box.className = 'photo';

          const img = document.createElement('img');

          /* 1️⃣ 直接加载缩略图，不使用模糊 */
          img.src = item.thumb;

          /* 2️⃣ thumb 放在 dataset 里，点击加载 full */
          img.dataset.thumb = item.thumb;

          /* 3️⃣ 点击才加载 full */
          img.onclick = () => openViewer(item.full);

          // 观察器开始观察图片
          io.observe(img);
          box.appendChild(img);
          grid.appendChild(box);
        });
      })

    /* ===== 查看大图 ===== */
    function openViewer(url) {
      viewer.style.display = 'flex';
      viewerImg.src = '';

      const img = new Image();
      img.onload = () => {
        viewerImg.src = url;
      };
      img.src = url;
    }

    viewer.onclick = () => {
      viewer.style.display = 'none';
      viewerImg.src = '';
    }
  </script>

</body>
</html>
