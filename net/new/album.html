<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>相册</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 6px;
  padding: 6px;
}
.photo {
  background: #1a1a1a;
  aspect-ratio: 1 / 1;
  overflow: hidden;
}
.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(16px);
  transition: filter .4s ease;
}

/* 大图查看 */
.viewer {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.95);
  display: none;
  align-items: center;
  justify-content: center;
}
.viewer img {
  max-width: 100%;
  max-height: 100%;
}
</style>
</head>

<body>

<div class="grid" id="grid"></div>

<div class="viewer" id="viewer">
  <img id="viewerImg">
</div>

<script>
const id = new URLSearchParams(location.search).get('id')
const grid = document.getElementById('grid')
const viewer = document.getElementById('viewer')
const viewerImg = document.getElementById('viewerImg')

const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (!e.isIntersecting) return
    const img = e.target
    img.src = img.dataset.src
    img.onload = () => img.style.filter = 'blur(0)'
    io.unobserve(img)
  })
}, { rootMargin: '200px' })

fetch(`data/${id}.json`)
  .then(r => r.json())
  .then(list => {
    list.forEach(item => {
      const box = document.createElement('div')
      box.className = 'photo'

      const img = document.createElement('img')
      img.dataset.src = item.thumb
      img.onclick = () => open(item.full)

      fetch(item.blur)
        .then(r => r.text())
        .then(b64 => img.src = 'data:image/jpeg;base64,' + b64)

      io.observe(img)
      box.appendChild(img)
      grid.appendChild(box)
    })
  })

function open(url) {
  viewer.style.display = 'flex'
  viewerImg.src = ''
  const img = new Image()
  img.onload = () => viewerImg.src = url
  img.src = url
}

viewer.onclick = () => {
  viewer.style.display = 'none'
  viewerImg.src = ''
}
</script>

</body>
</html>
