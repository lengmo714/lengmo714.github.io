<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>相册</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont;
    }

    /* 滚动容器 */
    .scroll {
      height: 100vh;
      overflow-y: auto;
    }

    /* 用来撑起总高度 */
    .spacer {
      position: relative;
      width: 100%;
    }

    /* 实际渲染的 grid */
    .grid {
      position: absolute;
      left: 0;
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 6px;
      padding: 6px;
    }

    .photo {
      background: #1a1a1a;
      aspect-ratio: 1 / 1;
      overflow: hidden;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ===== 大图查看 ===== */
    .viewer {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .viewer img {
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>

<body>

  <div class="scroll" id="scroll">
    <div class="spacer" id="spacer">
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <div class="viewer" id="viewer">
    <img id="viewerImg" />
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const albumId = params.get('id');

    const scroll = document.getElementById('scroll');
    const spacer = document.getElementById('spacer');
    const grid = document.getElementById('grid');

    const viewer = document.getElementById('viewer');
    const viewerImg = document.getElementById('viewerImg');

    const ITEM_SIZE = 160 + 6; // 图片尺寸 + gap（近似即可）
    const BUFFER_ROWS = 2;     // 上下多渲染几行，防止闪烁

    let list = [];
    let columns = 2;
    let rows = 0;

    function calcColumns() {
      columns = Math.floor(window.innerWidth / ITEM_SIZE);
      columns = Math.max(columns, 2);
    }

    function updateSpacer() {
      rows = Math.ceil(list.length / columns);
      spacer.style.height = rows * ITEM_SIZE + 'px';
    }

    function render() {
      const scrollTop = scroll.scrollTop;
      const viewHeight = scroll.clientHeight;

      const startRow = Math.max(
        0,
        Math.floor(scrollTop / ITEM_SIZE) - BUFFER_ROWS
      );

      const endRow = Math.min(
        rows,
        Math.ceil((scrollTop + viewHeight) / ITEM_SIZE) + BUFFER_ROWS
      );

      const startIndex = startRow * columns;
      const endIndex = Math.min(list.length, endRow * columns);

      grid.style.top = startRow * ITEM_SIZE + 'px';
      grid.innerHTML = '';

      for (let i = startIndex; i < endIndex; i++) {
        const item = list[i];
        const div = document.createElement('div');
        div.className = 'photo';

        const img = document.createElement('img');
        img.loading = 'lazy';
        img.src = item.thumb;

        img.onclick = () => openViewer(item.full);

        div.appendChild(img);
        grid.appendChild(div);
      }
    }

    fetch(`data/${albumId}.json`)
      .then(res => res.json())
      .then(data => {
        list = data;
        calcColumns();
        updateSpacer();
        render();
      });

    scroll.addEventListener('scroll', () => {
      requestAnimationFrame(render);
    });

    window.addEventListener('resize', () => {
      calcColumns();
      updateSpacer();
      render();
    });

    /* ===== 查看大图 ===== */
    function openViewer(url) {
      viewer.style.display = 'flex';
      viewerImg.src = '';

      const img = new Image();
      img.onload = () => {
        viewerImg.src = url;
      };
      img.src = url;
    }

    viewer.onclick = () => {
      viewer.style.display = 'none';
      viewerImg.src = '';
    };
  </script>

</body>
</html>
